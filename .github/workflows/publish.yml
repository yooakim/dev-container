name: Build and publish container images

on:
  push:
    branches: ["main", "master"]
    tags: ["python/v*"]
  pull_request:
    branches: ["main", "master"]
    # Skip closed: on merge, GITHUB_REF becomes the base branch (main) while the
    # trigger stays pull_request, so cache writes to scope=main are read-only and
    # fail. The push event on main already builds and publishes the merged result.
    types: [opened, synchronize, reopened]
  schedule:
    # Weekly rebuild to pick up base-image security patches even without code changes.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  hadolint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          config: .hadolint.yaml
          failure-threshold: error

  build:
    needs: hadolint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: python
            target: python
            image: dev-cli-python
            local_tag: dev-cli-python:ci
            cache_scope: python
    outputs:
      python_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=match,pattern=python/v(\d+\.\d+\.\d+),group=1
            type=match,pattern=python/v(\d+\.\d+)\.\d+,group=1
            type=match,pattern=python/v(\d+)\.\d+\.\d+,group=1
            type=ref,event=branch
            type=ref,event=pr
            type=sha
          flavor: |
            latest=auto

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ github.event_name == 'pull_request' && matrix.local_tag || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.cache_scope }}-${{ github.ref_name }}
            type=gha,scope=${{ matrix.cache_scope }}-main
          cache-to: ${{ github.event_name != 'pull_request' && format('type=gha,mode=max,scope={0}-{1}', matrix.cache_scope, github.ref_name) || '' }}
          # Attestations produce manifest lists; incompatible with load=true on PR builds.
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Pull image for scanning
        if: github.event_name != 'pull_request'
        run: docker pull "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"

      - name: Scan image for vulnerabilities
        env:
          SCAN_IMAGE: ${{ github.event_name == 'pull_request' && matrix.local_tag || format('{0}/{1}/{2}@{3}', env.REGISTRY, github.repository_owner, matrix.image, steps.build.outputs.digest) }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$GITHUB_WORKSPACE/.trivyignore:/.trivyignore:ro" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            aquasec/trivy:0.36.0 image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile /.trivyignore \
            --format sarif \
            --output /workspace/trivy-results-${{ matrix.id }}.sarif \
            "$SCAN_IMAGE"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results-${{ matrix.id }}.sarif
          category: trivy-${{ matrix.id }}

  sign:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.9.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign container image
        env:
          DIGEST: ${{ needs.build.outputs.python_digest }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ github.repository_owner }}/dev-cli-python@${DIGEST}"
