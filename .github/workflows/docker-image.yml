name: Build and publish container

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
    # Skip closed: on merge, GITHUB_REF becomes the base branch (main) while the
    # trigger stays pull_request, so cache writes to scope=main are read-only and
    # fail. The push event on main already builds and publishes the merged result.
    types: [opened, synchronize, reopened]

concurrency:
  # One group per branch/PR ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only auto-cancel redundant PR builds; let main/tag publish builds finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only log in and push on branch/tag pushes, not on PRs from forks.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Releases (git tag vX.Y.Z): full semver ladder so consumers can
            # pin at patch, minor, or major granularity.
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Newest build of the default branch (bleeding edge).
            type=ref,event=branch
            # PR validation images (not published).
            type=ref,event=pr
            # Exact, immutable per-commit reference.
            type=sha
          flavor: |
            # 'latest' tracks the newest released semver tag, not main.
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # PR builds use the merge ref (e.g. 5/merge); push builds use the branch
          # or tag name. Restore from main on PRs so they benefit from published
          # cache; only write cache on push (trusted trigger for default branch).
          cache-from: |
            type=gha,scope=${{ github.ref_name }}
            type=gha,scope=main
          cache-to: ${{ github.event_name != 'pull_request' && format('type=gha,mode=max,scope={0}', github.ref_name) || '' }}
