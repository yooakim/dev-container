name: Delete legacy dev-container package

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete remaining dev-container package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          package="dev-container"

          versions="$(gh api "user/packages/container/${package}/versions" --paginate --jq '.[] | [.id, (.metadata.container.tags | join(","))] | @tsv' || true)"
          if [ -z "${versions}" ]; then
            echo "No versions remain for ${package}."
          else
            echo "Remaining versions:"
            echo "${versions}"
            while IFS=$'\t' read -r version_id tags; do
              [ -n "${version_id}" ] || continue
              echo "Deleting version ${version_id} (tags: ${tags:-untagged})..."
              if ! echo -n | gh api -X DELETE "user/packages/container/${package}/versions/${version_id}" --input -; then
                echo "Warning: could not delete version ${version_id} (may exceed public download limit)."
              fi
            done <<< "${versions}"
          fi

          echo "Attempting to delete package ${package}..."
          if echo -n | gh api -X DELETE "user/packages/container/${package}" --input -; then
            echo "Deleted package ghcr.io/${{ github.repository_owner }}/${package}"
          else
            echo "Package shell may remain if a public version exceeded GitHub's 5000-download deletion limit."
            echo "Pulls are already broken; contact GitHub Support to remove the leftover package entry if needed."
          fi
