name: Delete legacy dev-container package

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all dev-container package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          package="dev-container"

          versions="$(gh api "user/packages/container/${package}/versions" --paginate --jq '.[].id' || true)"
          if [ -z "${versions}" ]; then
            echo "No versions found for ${package}; nothing to delete."
            exit 0
          fi

          while read -r version_id; do
            [ -n "${version_id}" ] || continue
            echo "Deleting version ${version_id}..."
            echo -n | gh api -X DELETE "user/packages/container/${package}/versions/${version_id}" --input -
          done <<< "${versions}"

          echo "Deleted all versions of ghcr.io/${{ github.repository_owner }}/${package}"
